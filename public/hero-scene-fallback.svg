<svg viewBox="0 0 600 420" width="600" height="420" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" aria-label="Isometric illustration of FRKTL modular nuclear factory" role="img">
  <defs>
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a7a3a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2d4a2a" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a5a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="buildingFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4714a"/>
      <stop offset="100%" stop-color="#a85e3a"/>
    </linearGradient>
    <linearGradient id="buildingSide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a85e3a"/>
      <stop offset="100%" stop-color="#8a4a2e"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect x="0" y="0" width="600" height="200" fill="url(#skyGrad)"/>

  <!-- Ground plane -->
  <polygon points="300,360 530,230 300,100 70,230" fill="#2d4a2a" opacity="0.6"/>
  <polygon points="300,360 530,230 300,100 70,230" fill="url(#groundGrad)"/>

  <!-- Main reactor building -->
  <polygon points="170,295 300,365 300,200 170,130" fill="url(#buildingFront)"/>
  <polygon points="300,365 430,295 430,130 300,200" fill="url(#buildingSide)"/>
  <polygon points="170,130 300,200 430,130 300,60" fill="#d4845a"/>

  <!-- Roof dome -->
  <ellipse cx="300" cy="100" rx="28" ry="14" fill="#c4714a" stroke="#b56040" stroke-width="1"/>
  <ellipse cx="300" cy="96" rx="20" ry="10" fill="#d4845a"/>

  <!-- Windows front -->
  <rect x="185" y="200" width="24" height="20" rx="2" fill="#d4aa7a" opacity="0.5"/>
  <rect x="218" y="200" width="24" height="20" rx="2" fill="#d4aa7a" opacity="0.5"/>
  <rect x="251" y="200" width="24" height="20" rx="2" fill="#d4aa7a" opacity="0.5"/>
  <rect x="185" y="238" width="24" height="18" rx="2" fill="#d4aa7a" opacity="0.35"/>
  <rect x="218" y="238" width="24" height="18" rx="2" fill="#d4aa7a" opacity="0.35"/>
  <rect x="251" y="238" width="24" height="18" rx="2" fill="#d4aa7a" opacity="0.35"/>

  <!-- Door -->
  <rect x="272" y="295" width="22" height="32" rx="2" fill="#8a4020" opacity="0.6"/>

  <!-- FRKTL sign -->
  <text x="228" y="278" text-anchor="middle" fill="white" font-size="11" font-weight="700" opacity="0.85" font-family="monospace">FRKTL</text>

  <!-- Cooling tower -->
  <polygon points="470,235 510,235 502,145 478,145" fill="#89b0c4" stroke="#6a90a8" stroke-width="1"/>
  <ellipse cx="490" cy="145" rx="12" ry="5" fill="#9ac0d4"/>
  <circle cx="490" cy="128" r="16" fill="white" opacity="0.82"/>
  <circle cx="477" cy="133" r="12" fill="white" opacity="0.75"/>
  <circle cx="504" cy="130" r="14" fill="white" opacity="0.7"/>
  <circle cx="490" cy="112" r="10" fill="white" opacity="0.5"/>

  <!-- Delivery truck -->
  <rect x="55" y="270" width="80" height="34" rx="3" fill="#4a7a8a" stroke="#3a6070" stroke-width="1"/>
  <rect x="108" y="255" width="28" height="26" rx="3" fill="#3a6070" stroke="#2a5060" stroke-width="1"/>
  <rect x="110" y="257" width="20" height="12" rx="1" fill="#89c0d4" opacity="0.6"/>
  <circle cx="73" cy="308" r="9" fill="#1a1a2a"/>
  <circle cx="73" cy="308" r="5" fill="#3a3a4a"/>
  <circle cx="118" cy="308" r="9" fill="#1a1a2a"/>
  <circle cx="118" cy="308" r="5" fill="#3a3a4a"/>

  <!-- Worker -->
  <circle cx="158" cy="305" r="4.5" fill="#1a1a2a" opacity="0.75"/>
  <line x1="158" y1="310" x2="158" y2="330" stroke="#1a1a2a" stroke-width="3" opacity="0.75"/>
  <line x1="154" y1="318" x2="162" y2="318" stroke="#1a1a2a" stroke-width="2" opacity="0.75"/>

  <!-- Trees -->
  <circle cx="95" cy="255" r="12" fill="#3a6a2a" opacity="0.7"/>
  <circle cx="92" cy="252" r="9" fill="#4a7a3a" opacity="0.8"/>
  <line x1="95" y1="267" x2="95" y2="280" stroke="#5a3a20" stroke-width="3"/>
</svg>
