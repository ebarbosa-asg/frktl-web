    position: after_wave_2
    required_complete: [T02, T03, T04, T05, T09]
    type: automatic
    notes: "All 5 Wave 2 tasks must pass before Wave 3 agents are spawned"

  - label: "Wave 3 → Wave 4 gate"
    position: after_wave_3
    required_complete: [T06, T07, T08, T10]
    type: human_review
    notes: >
      Human review recommended before deploy. Verify visual design output from T08,
      wordmark quality from T05, and mobile nav behavior from T06. This is the last
      chance to iterate before production deployment.
